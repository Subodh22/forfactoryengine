name: Release

# Tag a version (e.g. `git tag v0.1.0 && git push --tags`) to build the desktop
# installers for macOS / Windows / Linux and publish them to a GitHub Release,
# and to build + push the Docker image to GHCR.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  desktop:
    name: Desktop (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      # Build the UI + compile the engine, then assemble + package the app.
      - run: npm --prefix ui install && npm --prefix engine install
      - run: npm run build            # ui/dist + engine/dist/factory.mjs
      - run: npm --prefix desktop install

      - name: Build installers
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional code signing — set these repo secrets to sign releases:
          #   macOS: CSC_LINK (base64 .p12), CSC_KEY_PASSWORD, APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
          #   Windows: WIN_CSC_LINK, WIN_CSC_KEY_PASSWORD
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: npm run assemble && npx electron-builder --publish always

  docker:
    name: Docker image (GHCR)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}

  # Optional: publish the CLI to npm. Requires an NPM_TOKEN secret and a public
  # package name. Uncomment to enable.
